version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: materias_db
    environment:
      POSTGRES_DB: academic_db
      POSTGRES_USER: academic_admin
      POSTGRES_PASSWORD: SecurePassword2026!
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academic_admin -d academic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: materias_web
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: academic_db
      DB_USER: academic_admin
      DB_PASSWORD: SecurePassword2026!
      SESSION_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/var/www/html
